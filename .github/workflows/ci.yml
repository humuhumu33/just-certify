name: CI

on:
  push:
    branches: ["**"]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  rust:
    name: fmt / clippy / test
    runs-on: ubuntu-latest
    steps:
      # Check out both repos as siblings so the path dependency
      # path = "../../../../UOR-Framework/foundation" resolves correctly.
      - uses: actions/checkout@v4
        with:
          path: just-certify

      - uses: actions/checkout@v4
        with:
          repository: uor-foundation/UOR-Framework
          path: UOR-Framework

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            just-certify/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('just-certify/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - run: cargo fmt --all -- --check
        working-directory: just-certify

      - run: cargo clippy --all-targets --all-features -- -D warnings
        working-directory: just-certify

      - run: cargo test --all
        working-directory: just-certify

  openapi:
    name: Lint OpenAPI spec
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: npm install -g @redocly/cli@latest
      - run: redocly lint openapi.yaml
