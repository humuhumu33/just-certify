name: CI

on:
  push:
    branches: ["**"]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  rust:
    name: fmt / clippy / test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # The path dependency in crates/sem-ipld/Cargo.toml is
      # "../../../../UOR-Framework/foundation" — four levels above the
      # crate, which is two levels above the workspace root.  On the
      # runner that resolves to /home/runner/work/UOR-Framework, which
      # is outside $GITHUB_WORKSPACE, so actions/checkout can't place
      # it there.  A plain git clone to the exact absolute path is the
      # only reliable solution.
      - name: Clone UOR-Framework at expected path
        run: git clone --depth=1 https://github.com/uor-foundation/UOR-Framework ${{ runner.workspace }}/../UOR-Framework

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - run: cargo fmt --all -- --check
      - run: cargo clippy --all-targets --all-features -- -D warnings
      - run: cargo test --all

  openapi:
    name: Lint OpenAPI spec
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: npm install -g @redocly/cli@latest
      - run: redocly lint openapi.yaml
